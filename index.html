<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logline</title>
<style>
  :root {
    --bg:    #f8f9fa;
    --bg2:   #ffffff;
    --bg3:   #f0f1f3;
    --border:#d0d3d8;
    --text:  #1a1d23;
    --text2: #4a5568;
    --text3: #718096;
    --accent:#2563eb;
    --accent-hover:#1d4ed8;
    --danger:#dc2626;
    --success:#16a34a;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
    --sp-width: 320px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:   #0f1117;
      --bg2:  #1a1d27;
      --bg3:  #252836;
      --border:#2d3148;
      --text: #e2e8f0;
      --text2:#a0aec0;
      --text3:#718096;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Settings overlay & panel ─────────────────────────────────────────────── */
  #sp-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
  }
  #sp-overlay.open { display: block; }

  #settings-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: var(--sp-width);
    max-width: 100vw;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.22s ease;
    overflow: hidden;
  }
  #settings-panel.open { transform: translateX(0); }

  #sp-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sp-head h2 { font-size: 13px; font-weight: 700; }
  #sp-close {
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--text3); line-height: 1;
    padding: 0 2px; outline: none;
  }
  #sp-close:hover { color: var(--text); }

  #sp-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sp-tab {
    flex: 1; padding: 9px 0; font-size: 12px; font-weight: 600;
    background: none; border: none; cursor: pointer; color: var(--text3);
    font-family: var(--font); border-bottom: 2px solid transparent;
    margin-bottom: -1px; outline: none; transition: color 0.15s;
  }
  .sp-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  #sp-body {
    flex: 1; overflow-y: auto; padding: 12px 0;
  }

  .sp-section { display: none; }
  .sp-section.active { display: block; }

  .sp-list { list-style: none; padding: 0 0 8px; }

  .sp-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; min-height: 36px;
  }
  .sp-item:hover { background: var(--bg3); }

  .sp-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .sp-swatch input[type=color] {
    position: absolute; inset: 0; opacity: 0;
    width: 100%; height: 100%; cursor: pointer; border: none; padding: 0;
  }

  .sp-label {
    flex: 1; font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .sp-edit-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 16px;
  }
  .sp-edit-row input[type=text] {
    flex: 1; font-size: 13px; padding: 4px 7px;
    background: var(--bg3); border: 1px solid var(--accent);
    color: var(--text); border-radius: 4px; outline: none;
    font-family: var(--font);
  }

  .sp-icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px; line-height: 1;
    padding: 3px 5px; border-radius: 3px; outline: none;
    flex-shrink: 0; font-family: var(--font);
  }
  .sp-icon-btn:hover { color: var(--text); background: var(--bg3); }
  .sp-icon-btn.confirm { color: var(--success); }
  .sp-icon-btn.confirm:hover { background: var(--bg3); }
  .sp-icon-btn.del { color: var(--danger); }
  .sp-icon-btn.del:hover { background: var(--bg3); }

  .sp-add-btn {
    display: flex; align-items: center; gap: 6px;
    margin: 4px 16px 0; padding: 6px 10px;
    background: none; border: 1px dashed var(--border);
    border-radius: 5px; cursor: pointer; font-size: 12px;
    color: var(--text3); font-family: var(--font); outline: none; width: calc(100% - 32px);
  }
  .sp-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  #sp-foot {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sp-reset {
    font-size: 11px; color: var(--text3); background: none;
    border: none; cursor: pointer; font-family: var(--font);
    text-decoration: underline; padding: 0; outline: none;
  }
  #sp-reset:hover { color: var(--danger); }

  /* ── Header ───────────────────────────────────────────────────────────────── */
  #header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky; top: 0; z-index: 100;
  }

  #header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 7px;
    min-height: 30px;
  }

  #brand {
    font-size: 18px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.3px; flex-shrink: 0; user-select: none;
  }
  #logo-log {
    cursor: default;
    display: inline-block;
    transition: transform 0.1s;
  }
  #logo-log:active { transform: scale(0.9); }

  #gear-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 15px; padding: 2px 4px;
    border-radius: 4px; outline: none; flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }
  #gear-btn:hover { color: var(--accent); background: var(--bg3); }
  #gear-btn:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  #gear-btn.active { color: var(--accent); }

  #title-input {
    flex: 1; min-width: 160px; font-size: 14px; font-weight: 500;
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--text); padding: 2px 4px; outline: none; font-family: var(--font);
  }
  #title-input:focus { border-bottom-color: var(--accent); }
  #title-input::placeholder { color: var(--text3); font-weight: 400; }

  #type-select {
    font-size: 11px; font-weight: 700; padding: 3px 7px;
    border-radius: 4px; cursor: pointer; border: 1px solid;
    font-family: var(--font); outline: none;
    text-transform: uppercase; letter-spacing: 0.5px;
    flex-shrink: 0; max-width: 120px;
  }

  #status-toggle {
    font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: 4px; cursor: pointer; border: 1px solid transparent;
    font-family: var(--font); letter-spacing: 0.3px; outline: none; flex-shrink: 0;
  }
  #status-toggle.active     { background: #dcfce7; color: #15803d; border-color: #86efac; }
  #status-toggle.monitoring { background: #fef9c3; color: #a16207; border-color: #fde047; }
  #status-toggle.closed     { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
  @media (prefers-color-scheme: dark) {
    #status-toggle.active     { background: #14532d; color: #86efac; border-color: #166534; }
    #status-toggle.monitoring { background: #422006; color: #fde047; border-color: #713f12; }
    #status-toggle.closed     { background: #1e293b; color: #94a3b8; border-color: #334155; }
  }

  #timer-group {
    margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #clock { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  #elapsed { font-family: var(--mono); font-size: 12px; color: var(--success); font-weight: 600; }
  #elapsed.hidden { display: none; }

  #header-bottom { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  #tags-input {
    flex: 1; min-width: 120px; font-size: 12px;
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--text); padding: 2px 4px; outline: none; font-family: var(--font);
  }
  #tags-input:focus { border-bottom-color: var(--accent); }
  #tags-input::placeholder { color: var(--text3); }

  #tags-pills { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .tag-pill {
    font-size: 11px; padding: 1px 7px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text2);
    cursor: pointer; user-select: none;
  }
  .tag-pill:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Main ─────────────────────────────────────────────────────────────────── */
  #main { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* ── Entry area ───────────────────────────────────────────────────────────── */
  #entry-area {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 14px;
  }
  #entry-area h2 {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-bottom: 8px;
  }
  .entry-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

  .entry-row input, .entry-row select {
    font-family: var(--font); font-size: 13px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 6px 8px; border-radius: 4px; outline: none;
  }
  .entry-row input:focus, .entry-row select:focus { border-color: var(--accent); }

  #new-time     { width: 70px; font-family: var(--mono); flex-shrink: 0; }
  #new-category { width: 128px; flex-shrink: 0; }
  #new-desc     { flex: 1; min-width: 100px; }
  #new-author   { width: 78px; flex-shrink: 0; }

  #add-btn {
    padding: 6px 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 4px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--font); outline: none; flex-shrink: 0;
  }
  #add-btn:hover { background: var(--accent-hover); }
  #add-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Timeline ─────────────────────────────────────────────────────────────── */
  #timeline-area {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 14px; overflow: hidden;
  }
  #timeline-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg3);
  }
  #timeline-header h2 {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3);
  }
  #event-count { font-size: 11px; color: var(--text3); }

  .event-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; border-bottom: 1px solid var(--border);
    cursor: pointer; position: relative;
  }
  .event-item:last-child { border-bottom: none; }
  .event-item:hover { background: var(--bg3); }

  .event-time {
    font-family: var(--mono); font-size: 12px;
    color: var(--text2); width: 40px; flex-shrink: 0;
  }
  .cat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block;
  }
  .event-cat-label {
    font-size: 11px; font-weight: 600; width: 92px; flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
  }
  .event-desc { flex: 1; font-size: 13px; color: var(--text); min-width: 0; }
  .event-author { font-size: 11px; color: var(--text3); flex-shrink: 0; }

  .event-delete {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px;
    opacity: 0; transition: opacity 0.1s; flex-shrink: 0; font-family: var(--font); outline: none;
  }
  .event-item:hover .event-delete { opacity: 1; }
  .event-delete:focus { opacity: 1; outline: 1px solid var(--danger); border-radius: 2px; }

  .event-edit-row {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    padding: 7px 12px; background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .event-edit-row:last-child { border-bottom: none; }
  .event-edit-row input, .event-edit-row select {
    font-family: var(--font); font-size: 13px;
    background: var(--bg2); border: 1px solid var(--accent);
    color: var(--text); padding: 4px 7px; border-radius: 4px; outline: none;
  }
  .ev-time   { width: 66px; font-family: var(--mono); flex-shrink: 0; }
  .ev-cat    { width: 126px; flex-shrink: 0; }
  .ev-desc   { flex: 1; min-width: 80px; }
  .ev-author { width: 76px; flex-shrink: 0; }

  .save-btn {
    padding: 4px 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 4px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font); flex-shrink: 0;
  }

  #empty-state { padding: 28px; text-align: center; color: var(--text3); font-size: 13px; }

  /* ── Summary bar ──────────────────────────────────────────────────────────── */
  #summary-bar {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 14px; display: flex; gap: 20px; flex-wrap: wrap;
    margin-bottom: 14px; align-items: center;
  }
  .summary-item { font-size: 12px; color: var(--text2); }
  .summary-item strong { color: var(--text); font-weight: 600; }
  .summary-cat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text2); }

  /* ── Export ───────────────────────────────────────────────────────────────── */
  #export-area {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  #export-area h2 {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-right: 2px;
  }
  .export-btn {
    padding: 5px 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer;
    color: var(--text); font-family: var(--font); outline: none;
  }
  .export-btn:hover { background: var(--border); }
  .export-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .export-btn.copied { background: #dcfce7; color: #15803d; border-color: #86efac; }
  @media (prefers-color-scheme: dark) { .export-btn.copied { background: #14532d; color: #86efac; border-color: #166534; } }

  /* ── Footer ───────────────────────────────────────────────────────────────── */
  #footer {
    border-top: 1px solid var(--border); background: var(--bg2);
    padding: 9px 16px; display: flex; align-items: center;
    justify-content: space-between; font-size: 11px; color: var(--text3);
  }
  #new-log-btn {
    padding: 3px 10px; background: none; border: 1px solid var(--border);
    border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--text2);
    font-family: var(--font); outline: none;
  }
  #new-log-btn:hover { border-color: var(--danger); color: var(--danger); }
  #new-log-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  select option { background: var(--bg2); color: var(--text); }

  /* ── Responsive ───────────────────────────────────────────────────────────── */

  /* Medium: ≤820px — header starts compressing */
  @media (max-width: 820px) {
    #header { padding: 8px 12px; }
    #main { padding: 12px; }
    #timer-group { margin-left: auto; }
    #title-input { min-width: 120px; }
  }

  /* Compact: ≤640px — entry row wraps to two lines */
  @media (max-width: 640px) {
    #header-top { gap: 7px; }
    #title-input { order: 10; width: 100%; min-width: 0; flex-basis: 100%; }
    #timer-group { margin-left: auto; }

    .entry-row { row-gap: 6px; }
    #new-time     { flex: 0 0 66px; }
    #new-category { flex: 1; width: auto; min-width: 100px; }
    #new-desc     { order: 10; flex-basis: 100%; width: 100%; }
    #new-author   { flex: 1; width: auto; }
    #add-btn      { flex-shrink: 0; }

    .event-cat-label { width: auto; min-width: 76px; }
    .event-author { display: none; }
  }

  /* Mini: ≤440px — squeeze hard */
  @media (max-width: 440px) {
    :root { --sp-width: 100vw; }
    #header { padding: 7px 10px; }
    #main { padding: 8px; }
    #brand { font-size: 16px; }

    #new-time, #new-category, #new-desc, #new-author, #add-btn {
      flex-basis: 100%; width: 100%; flex: none;
    }

    .event-time { width: 34px; font-size: 11px; }
    .event-cat-label { width: 72px; font-size: 10px; }
    .event-desc { font-size: 12px; }

    #summary-bar { gap: 12px; padding: 8px 10px; }
    #export-area { gap: 6px; }
    .export-btn { padding: 5px 9px; font-size: 11px; }
  }

  /* Landscape/narrow height: ≤500px tall — shrink header */
  @media (max-height: 500px) {
    #header { padding: 6px 14px; }
    #header-top { margin-bottom: 4px; }
    #main { padding: 8px 14px; }
    #entry-area { padding: 7px 10px; margin-bottom: 8px; }
    #timeline-area { margin-bottom: 8px; }
    #summary-bar { padding: 6px 12px; margin-bottom: 8px; }
  }

  /* ── Easter egg animations ────────────────────────────────────────────────── */
  @keyframes logRoll {
    0%   { transform: translateX(0)              rotate(0deg);   opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { transform: translateX(calc(100vw + 120px)) rotate(900deg); opacity: 0; }
  }
  @keyframes brandBounce {
    0%,100% { transform: translateY(0)   rotate(0deg); }
    20%     { transform: translateY(-4px) rotate(-3deg); }
    40%     { transform: translateY(2px)  rotate(2deg); }
    60%     { transform: translateY(-3px) rotate(-2deg); }
    80%     { transform: translateY(1px)  rotate(1deg); }
  }

  .rolling-log {
    position: fixed; font-size: 52px; z-index: 150; pointer-events: none;
    left: -80px; white-space: nowrap;
    animation: logRoll linear forwards;
  }
  #brand.bouncing { animation: brandBounce 0.6s ease; }
</style>
</head>
<body>

<!-- ── Settings panel ────────────────────────────────────────────────────── -->
<div id="sp-overlay"></div>
<div id="settings-panel">
  <div id="sp-head">
    <h2>Customize</h2>
    <button id="sp-close" title="Close">×</button>
  </div>
  <div id="sp-tabs">
    <button class="sp-tab active" data-tab="types">Log Types</button>
    <button class="sp-tab" data-tab="categories">Categories</button>
  </div>
  <div id="sp-body">
    <div id="sp-types"  class="sp-section active">
      <ul class="sp-list" id="types-list"></ul>
      <button class="sp-add-btn" id="add-type-btn">+ Add type</button>
    </div>
    <div id="sp-categories" class="sp-section">
      <ul class="sp-list" id="cats-list"></ul>
      <button class="sp-add-btn" id="add-cat-btn">+ Add category</button>
    </div>
  </div>
  <div id="sp-foot">
    <button id="sp-reset">Reset to defaults</button>
  </div>
</div>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<div id="header">
  <div id="header-top">
    <span id="brand"><span id="logo-log">Log</span>line</span>
    <button id="gear-btn" title="Customize fields">⚙</button>
    <input id="title-input" type="text" placeholder="Log title — e.g. Payment API degradation" autocomplete="off" spellcheck="false">
    <select id="type-select"></select>
    <button id="status-toggle" class="active">Active</button>
    <div id="timer-group">
      <span id="clock"></span>
      <span id="elapsed" class="hidden"></span>
    </div>
  </div>
  <div id="header-bottom">
    <input id="tags-input" type="text" placeholder="Tags: payments-api, checkout-service…" autocomplete="off">
    <div id="tags-pills"></div>
  </div>
</div>

<!-- ── Main ──────────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="entry-area">
    <h2>New Event</h2>
    <div class="entry-row">
      <input id="new-time"     type="text" placeholder="HH:MM" maxlength="5" autocomplete="off">
      <select id="new-category"></select>
      <input id="new-desc"     type="text" placeholder="Describe what happened…" autocomplete="off">
      <input id="new-author"   type="text" placeholder="Author" autocomplete="off" maxlength="20">
      <button id="add-btn">Add</button>
    </div>
  </div>

  <div id="timeline-area">
    <div id="timeline-header">
      <h2>Timeline</h2>
      <span id="event-count">0 events</span>
    </div>
    <div id="timeline">
      <div id="empty-state">No events yet — add the first one above.</div>
    </div>
  </div>

  <div id="summary-bar">
    <div class="summary-item"><strong id="summary-duration">—</strong> duration</div>
    <div class="summary-item"><strong id="summary-total">0</strong> events</div>
    <div id="summary-cats"></div>
  </div>

  <div id="export-area">
    <h2>Export</h2>
    <button class="export-btn" id="copy-text-btn">Copy as plain text</button>
    <button class="export-btn" id="copy-md-btn">Copy as Markdown</button>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<div id="footer">
  <span id="last-saved">Not saved yet</span>
  <button id="new-log-btn">New log</button>
</div>

<script>
(function () {
'use strict';

// ── Defaults ──────────────────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  types: [
    { id: 'incident',   label: 'Incident',   color: '#dc2626' },
    { id: 'deployment', label: 'Deployment', color: '#2563eb' },
    { id: 'meeting',    label: 'Meeting',    color: '#7c3aed' },
    { id: 'escalation', label: 'Escalation', color: '#ea580c' },
    { id: 'other',      label: 'Other',      color: '#4b5563' },
  ],
  categories: [
    { id: 'detection',   label: 'Detection',   color: '#dc2626' },
    { id: 'engineering', label: 'Engineering', color: '#2563eb' },
    { id: 'comms',       label: 'Comms',       color: '#7c3aed' },
    { id: 'external',    label: 'External',    color: '#ea580c' },
    { id: 'resolution',  label: 'Resolution',  color: '#16a34a' },
  ],
};

// ── State ─────────────────────────────────────────────────────────────────────
let settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
let state = {
  title: '',
  type: 'incident',
  status: 'active',
  tags: [],
  events: [],
  firstEventTime: null,
};

const STATUSES = ['active', 'monitoring', 'closed'];
const STATUS_LABELS = { active: 'Active', monitoring: 'Monitoring', closed: 'Closed' };

// ── DOM ───────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const titleInput    = $('title-input');
const typeSelect    = $('type-select');
const statusToggle  = $('status-toggle');
const clockEl       = $('clock');
const elapsedEl     = $('elapsed');
const tagsInput     = $('tags-input');
const tagsPills     = $('tags-pills');
const newTime       = $('new-time');
const newCat        = $('new-category');
const newDesc       = $('new-desc');
const newAuthor     = $('new-author');
const addBtn        = $('add-btn');
const timeline      = $('timeline');
const eventCount    = $('event-count');
const summaryDuration = $('summary-duration');
const summaryTotal    = $('summary-total');
const summaryCats     = $('summary-cats');
const lastSaved     = $('last-saved');
const newLogBtn     = $('new-log-btn');
const gearBtn       = $('gear-btn');
const spOverlay     = $('sp-overlay');
const spPanel       = $('settings-panel');
const spClose       = $('sp-close');
const typesList     = $('types-list');
const catsList      = $('cats-list');
const brand         = $('brand');
const logoLog       = $('logo-log');

// ── Utils ─────────────────────────────────────────────────────────────────────
const pad2 = n => String(n).padStart(2, '0');

function nowHHMM() {
  const d = new Date();
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}
function nowHHMMSS() {
  const d = new Date();
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
}
function parseHHMM(s) {
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
  return (h > 23 || mi > 59) ? null : h * 60 + mi;
}
function formatDuration(min) {
  if (min < 0) min = 0;
  const h = Math.floor(min / 60), m = min % 60;
  return h === 0 ? m + 'm' : h + 'h ' + m + 'm';
}
function elapsedSince(iso) {
  const d = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  const h = Math.floor(d / 3600), m = Math.floor((d % 3600) / 60), s = d % 60;
  return h > 0 ? '+' + h + ':' + pad2(m) + ':' + pad2(s) : '+' + m + ':' + pad2(s);
}
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function escapeMd(s) { return String(s).replace(/([|`*_~[\]])/g, '\\$1'); }

function hexToRgba(hex, a) {
  const h = hex.replace('#', '');
  return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;
}

function getType(id) { return settings.types.find(t => t.id === id); }
function getCat(id)  { return settings.categories.find(c => c.id === id); }

// ── Persist ───────────────────────────────────────────────────────────────────
function saveState() {
  localStorage.setItem('logline_state', JSON.stringify(state));
  lastSaved.textContent = 'Last saved: ' + nowHHMMSS();
}
function saveSettings() {
  localStorage.setItem('logline_settings', JSON.stringify(settings));
}
function loadAll() {
  try {
    const s = localStorage.getItem('logline_settings');
    if (s) settings = JSON.parse(s);
  } catch(e) {}
  try {
    const s = localStorage.getItem('logline_state');
    if (s) Object.assign(state, JSON.parse(s));
  } catch(e) {}
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function tickClock() {
  clockEl.textContent = nowHHMMSS();
  if (state.firstEventTime) {
    elapsedEl.textContent = elapsedSince(state.firstEventTime);
    elapsedEl.classList.remove('hidden');
  } else {
    elapsedEl.classList.add('hidden');
  }
}
setInterval(tickClock, 1000);
tickClock();

// ── Rebuild selects ───────────────────────────────────────────────────────────
function rebuildTypeSelect() {
  const prev = typeSelect.value || state.type;
  typeSelect.innerHTML = '';
  settings.types.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id; o.textContent = t.label;
    typeSelect.appendChild(o);
  });
  const ids = settings.types.map(t => t.id);
  state.type = ids.includes(prev) ? prev : ids[0] || '';
  typeSelect.value = state.type;
  styleTypeSelect();
}

function rebuildCatSelect() {
  const prev = newCat.value;
  newCat.innerHTML = '';
  settings.categories.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.label;
    newCat.appendChild(o);
  });
  const ids = settings.categories.map(c => c.id);
  newCat.value = ids.includes(prev) ? prev : ids[0] || '';
}

function styleTypeSelect() {
  const t = getType(state.type);
  const color = t ? t.color : '#4b5563';
  typeSelect.style.color = color;
  typeSelect.style.backgroundColor = hexToRgba(color, 0.12);
  typeSelect.style.borderColor = hexToRgba(color, 0.4);
}

// ── Render header ─────────────────────────────────────────────────────────────
function renderHeader() {
  titleInput.value = state.title;
  rebuildTypeSelect();
  statusToggle.className = state.status;
  statusToggle.textContent = STATUS_LABELS[state.status];
  renderTags();
}

function renderTags() {
  tagsPills.innerHTML = '';
  state.tags.forEach((tag, i) => {
    const p = document.createElement('span');
    p.className = 'tag-pill';
    p.textContent = tag;
    p.title = 'Click to remove';
    p.addEventListener('click', () => {
      state.tags.splice(i, 1);
      saveState(); renderTags();
    });
    tagsPills.appendChild(p);
  });
}

// ── Timeline ──────────────────────────────────────────────────────────────────
let editingId = null;

function sortedEvents() {
  return [...state.events].sort((a, b) => {
    const pa = parseHHMM(a.time), pb = parseHHMM(b.time);
    if (pa === null && pb === null) return 0;
    if (pa === null) return 1; if (pb === null) return -1;
    return pa - pb;
  });
}

function renderTimeline() {
  const events = sortedEvents();
  eventCount.textContent = events.length + (events.length === 1 ? ' event' : ' events');

  if (events.length === 0) {
    timeline.innerHTML = '<div id="empty-state">No events yet — add the first one above.</div>';
    renderSummary(events); return;
  }

  timeline.innerHTML = '';
  events.forEach(ev => {
    timeline.appendChild(ev.id === editingId ? buildEditRow(ev) : buildEventRow(ev));
  });
  renderSummary(events);
}

function buildEventRow(ev) {
  const div = document.createElement('div');
  div.className = 'event-item';
  div.dataset.id = ev.id;

  const timeEl = document.createElement('span');
  timeEl.className = 'event-time';
  timeEl.textContent = ev.time;

  const cat = getCat(ev.category);
  const catColor = cat ? cat.color : '#718096';
  const catLabel = cat ? cat.label : ev.category;

  const catEl = document.createElement('span');
  catEl.className = 'event-cat-label';
  catEl.style.color = catColor;

  const dot = document.createElement('span');
  dot.className = 'cat-dot';
  dot.style.background = catColor;
  catEl.appendChild(dot);
  catEl.appendChild(document.createTextNode(catLabel));

  const descEl = document.createElement('span');
  descEl.className = 'event-desc';
  descEl.textContent = ev.desc;

  const authorEl = document.createElement('span');
  authorEl.className = 'event-author';
  authorEl.textContent = ev.author ? '(' + ev.author + ')' : '';

  const delBtn = document.createElement('button');
  delBtn.className = 'event-delete';
  delBtn.textContent = '×';
  delBtn.title = 'Delete';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    state.events = state.events.filter(x => x.id !== ev.id);
    if (!state.events.length) state.firstEventTime = null;
    saveState(); renderTimeline();
  });

  div.appendChild(timeEl); div.appendChild(catEl);
  div.appendChild(descEl); div.appendChild(authorEl); div.appendChild(delBtn);
  div.addEventListener('click', () => { editingId = ev.id; renderTimeline(); });
  return div;
}

function buildEditRow(ev) {
  const div = document.createElement('div');
  div.className = 'event-edit-row';

  const timeIn = document.createElement('input');
  timeIn.className = 'ev-time'; timeIn.type = 'text';
  timeIn.value = ev.time; timeIn.maxLength = 5;

  const catIn = document.createElement('select');
  catIn.className = 'ev-cat';
  settings.categories.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.label;
    if (c.id === ev.category) o.selected = true;
    catIn.appendChild(o);
  });

  const descIn = document.createElement('input');
  descIn.className = 'ev-desc'; descIn.type = 'text'; descIn.value = ev.desc;

  const authIn = document.createElement('input');
  authIn.className = 'ev-author'; authIn.type = 'text';
  authIn.value = ev.author || ''; authIn.maxLength = 20;

  const saveBtn = document.createElement('button');
  saveBtn.className = 'save-btn'; saveBtn.textContent = 'Save';

  const delBtn = document.createElement('button');
  delBtn.className = 'event-delete'; delBtn.style.opacity = '1';
  delBtn.textContent = '×'; delBtn.title = 'Delete';

  function commit() {
    const t = timeIn.value.trim();
    if (!t || parseHHMM(t) === null) { timeIn.focus(); return; }
    const d = descIn.value.trim();
    if (!d) { descIn.focus(); return; }
    ev.time = t; ev.category = catIn.value;
    ev.desc = d; ev.author = authIn.value.trim();
    editingId = null; saveState(); renderTimeline();
  }

  saveBtn.addEventListener('click', commit);
  delBtn.addEventListener('click', () => {
    state.events = state.events.filter(x => x.id !== ev.id);
    if (!state.events.length) state.firstEventTime = null;
    editingId = null; saveState(); renderTimeline();
  });
  [timeIn, catIn, descIn, authIn].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { editingId = null; renderTimeline(); }
    });
  });

  div.appendChild(timeIn); div.appendChild(catIn);
  div.appendChild(descIn); div.appendChild(authIn);
  div.appendChild(saveBtn); div.appendChild(delBtn);
  setTimeout(() => descIn.focus(), 0);
  return div;
}

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary(events) {
  summaryTotal.textContent = events.length;
  if (events.length < 2) {
    summaryDuration.textContent = '—';
  } else {
    const ts = events.map(e => parseHHMM(e.time)).filter(t => t !== null);
    summaryDuration.textContent = ts.length >= 2
      ? formatDuration(Math.max(...ts) - Math.min(...ts)) : '—';
  }
  const cats = {};
  events.forEach(e => { cats[e.category] = (cats[e.category] || 0) + 1; });
  summaryCats.innerHTML = '';
  Object.entries(cats).sort((a,b) => b[1]-a[1]).forEach(([id, n]) => {
    const c = getCat(id);
    const color = c ? c.color : '#718096';
    const label = c ? c.label : id;
    const el = document.createElement('div');
    el.className = 'summary-cat';
    const dot = document.createElement('span');
    dot.className = 'cat-dot'; dot.style.background = color;
    el.appendChild(dot);
    el.appendChild(document.createTextNode(label + ': ' + n));
    summaryCats.appendChild(el);
  });
}

// ── Add event ─────────────────────────────────────────────────────────────────
function addEvent() {
  const t = newTime.value.trim();
  if (!t || parseHHMM(t) === null) {
    newTime.style.borderColor = 'var(--danger)';
    newTime.focus();
    setTimeout(() => newTime.style.borderColor = '', 1200);
    return;
  }
  const desc = newDesc.value.trim();
  if (!desc) {
    newDesc.style.borderColor = 'var(--danger)';
    newDesc.focus();
    setTimeout(() => newDesc.style.borderColor = '', 1200);
    return;
  }
  const author = newAuthor.value.trim();
  if (author) localStorage.setItem('logline_last_author', author);

  state.events.push({ id: uid(), time: t, category: newCat.value, desc, author });
  if (!state.firstEventTime) state.firstEventTime = new Date().toISOString();

  newDesc.value = '';
  newTime.value = nowHHMM();
  newDesc.focus();
  saveState(); renderTimeline();
}

[newTime, newCat, newDesc, newAuthor, addBtn].forEach(f => {
  f.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addEvent(); } });
});
addBtn.addEventListener('click', addEvent);

// ── Header controls ───────────────────────────────────────────────────────────
titleInput.addEventListener('input', () => { state.title = titleInput.value; saveState(); });

typeSelect.addEventListener('change', () => { state.type = typeSelect.value; styleTypeSelect(); saveState(); });

statusToggle.addEventListener('click', () => {
  const i = STATUSES.indexOf(state.status);
  state.status = STATUSES[(i + 1) % STATUSES.length];
  statusToggle.className = state.status;
  statusToggle.textContent = STATUS_LABELS[state.status];
  saveState();
});
statusToggle.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); statusToggle.click(); }
});

tagsInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = tagsInput.value.replace(/,/g,'').trim();
    if (v && !state.tags.includes(v)) { state.tags.push(v); saveState(); renderTags(); }
    tagsInput.value = '';
  }
  if (e.key === 'Backspace' && tagsInput.value === '' && state.tags.length) {
    state.tags.pop(); saveState(); renderTags();
  }
});
tagsInput.addEventListener('blur', () => {
  const v = tagsInput.value.trim().replace(/,/g,'');
  if (v && !state.tags.includes(v)) { state.tags.push(v); saveState(); renderTags(); }
  tagsInput.value = '';
});

// ── Settings panel ────────────────────────────────────────────────────────────
let spOpen = false;

function openSettings() {
  spOpen = true;
  spOverlay.classList.add('open');
  spPanel.classList.add('open');
  gearBtn.classList.add('active');
  renderSettingsPanel();
}
function closeSettings() {
  spOpen = false;
  spOverlay.classList.remove('open');
  spPanel.classList.remove('open');
  gearBtn.classList.remove('active');
}

gearBtn.addEventListener('click', () => spOpen ? closeSettings() : openSettings());
spOverlay.addEventListener('click', closeSettings);
spClose.addEventListener('click', closeSettings);

// Tab switching
document.querySelectorAll('.sp-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sp-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sp-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    $('sp-' + btn.dataset.tab).classList.add('active');
  });
});

function renderSettingsPanel() {
  renderTypesList();
  renderCatsList();
}

function renderTypesList() {
  typesList.innerHTML = '';
  settings.types.forEach((t, i) => {
    typesList.appendChild(buildSettingsRow({
      item: t,
      onSave: (label, color) => {
        t.label = label; t.color = color;
        saveSettings(); rebuildTypeSelect(); renderTimeline();
        renderTypesList();
      },
      onDelete: () => {
        if (settings.types.length <= 1) return;
        settings.types.splice(i, 1);
        saveSettings(); rebuildTypeSelect(); renderTimeline();
        renderTypesList();
      },
    }));
  });
}

function renderCatsList() {
  catsList.innerHTML = '';
  settings.categories.forEach((c, i) => {
    catsList.appendChild(buildSettingsRow({
      item: c,
      onSave: (label, color) => {
        c.label = label; c.color = color;
        saveSettings(); rebuildCatSelect(); renderTimeline();
        renderCatsList();
      },
      onDelete: () => {
        if (settings.categories.length <= 1) return;
        settings.categories.splice(i, 1);
        saveSettings(); rebuildCatSelect(); renderTimeline();
        renderCatsList();
      },
    }));
  });
}

function buildSettingsRow({ item, onSave, onDelete }) {
  const li = document.createElement('li');
  li.className = 'sp-item';

  const swatch = document.createElement('div');
  swatch.className = 'sp-swatch';
  swatch.style.background = item.color;
  const colorIn = document.createElement('input');
  colorIn.type = 'color'; colorIn.value = item.color;
  swatch.appendChild(colorIn);
  colorIn.addEventListener('input', () => { swatch.style.background = colorIn.value; });

  const label = document.createElement('span');
  label.className = 'sp-label';
  label.textContent = item.label;

  const editBtn = document.createElement('button');
  editBtn.className = 'sp-icon-btn';
  editBtn.title = 'Edit'; editBtn.textContent = '✏';

  const delBtn = document.createElement('button');
  delBtn.className = 'sp-icon-btn del';
  delBtn.title = 'Delete'; delBtn.textContent = '×';
  delBtn.addEventListener('click', onDelete);

  li.appendChild(swatch); li.appendChild(label);
  li.appendChild(editBtn); li.appendChild(delBtn);

  editBtn.addEventListener('click', () => {
    // Switch to inline edit
    const row = document.createElement('div');
    row.className = 'sp-edit-row';

    const editSwatch = document.createElement('div');
    editSwatch.className = 'sp-swatch';
    editSwatch.style.background = item.color;
    const editColorIn = document.createElement('input');
    editColorIn.type = 'color'; editColorIn.value = item.color;
    editSwatch.appendChild(editColorIn);
    editColorIn.addEventListener('input', () => { editSwatch.style.background = editColorIn.value; });

    const textIn = document.createElement('input');
    textIn.type = 'text'; textIn.value = item.label; textIn.maxLength = 32;

    const saveBtn = document.createElement('button');
    saveBtn.className = 'sp-icon-btn confirm'; saveBtn.textContent = '✓';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'sp-icon-btn'; cancelBtn.textContent = '✕';

    function commit() {
      const v = textIn.value.trim();
      if (!v) return;
      onSave(v, editColorIn.value);
    }
    saveBtn.addEventListener('click', commit);
    cancelBtn.addEventListener('click', () => { li.parentNode && li.parentNode.replaceChild(li, row); });
    textIn.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { cancelBtn.click(); }
    });

    row.appendChild(editSwatch); row.appendChild(textIn);
    row.appendChild(saveBtn); row.appendChild(cancelBtn);
    li.parentNode.replaceChild(row, li);
    textIn.focus(); textIn.select();
  });

  return li;
}

function buildNewRow(onSave) {
  const row = document.createElement('div');
  row.className = 'sp-edit-row';

  const swatch = document.createElement('div');
  swatch.className = 'sp-swatch';
  const randColor = '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
  swatch.style.background = randColor;
  const colorIn = document.createElement('input');
  colorIn.type = 'color'; colorIn.value = randColor;
  swatch.appendChild(colorIn);
  colorIn.addEventListener('input', () => { swatch.style.background = colorIn.value; });

  const textIn = document.createElement('input');
  textIn.type = 'text'; textIn.placeholder = 'Label…'; textIn.maxLength = 32;

  const saveBtn = document.createElement('button');
  saveBtn.className = 'sp-icon-btn confirm'; saveBtn.textContent = '✓';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'sp-icon-btn'; cancelBtn.textContent = '✕';

  function commit() {
    const v = textIn.value.trim();
    if (!v) return;
    onSave(v, colorIn.value);
  }
  saveBtn.addEventListener('click', commit);
  cancelBtn.addEventListener('click', () => row.remove());
  textIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { cancelBtn.click(); }
  });

  row.appendChild(swatch); row.appendChild(textIn);
  row.appendChild(saveBtn); row.appendChild(cancelBtn);
  setTimeout(() => textIn.focus(), 0);
  return row;
}

$('add-type-btn').addEventListener('click', () => {
  const row = buildNewRow((label, color) => {
    settings.types.push({ id: uid(), label, color });
    saveSettings(); rebuildTypeSelect(); renderTypesList();
  });
  typesList.after(row);
});

$('add-cat-btn').addEventListener('click', () => {
  const row = buildNewRow((label, color) => {
    settings.categories.push({ id: uid(), label, color });
    saveSettings(); rebuildCatSelect(); renderCatsList();
  });
  catsList.after(row);
});

$('sp-reset').addEventListener('click', () => {
  if (!confirm('Reset types and categories to defaults?')) return;
  settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  saveSettings(); rebuildTypeSelect(); rebuildCatSelect();
  renderTimeline(); renderSettingsPanel();
});

// ── Export ────────────────────────────────────────────────────────────────────
function getDuration() {
  const evs = sortedEvents();
  if (evs.length < 2) return null;
  const ts = evs.map(e => parseHHMM(e.time)).filter(t => t !== null);
  return ts.length >= 2 ? formatDuration(Math.max(...ts) - Math.min(...ts)) : null;
}

function buildPlainText() {
  const evs = sortedEvents();
  const dur = getDuration() || '—';
  const t = getType(state.type);
  const typeLabel = t ? t.label : state.type;
  const sep = '─'.repeat(41);
  const lines = [
    'LOGLINE — ' + (state.title || '(untitled)'),
    'Type: ' + typeLabel + ' | Status: ' + STATUS_LABELS[state.status] + ' | Duration: ' + dur,
    'Tags: ' + (state.tags.length ? state.tags.join(', ') : '—'),
    sep, '',
  ];
  evs.forEach(ev => {
    const c = getCat(ev.category);
    const cat = '[' + (c ? c.label : ev.category) + ']';
    const auth = ev.author ? ' (' + ev.author + ')' : '';
    lines.push(ev.time + ' ' + cat.padEnd(14) + ' ' + ev.desc + auth);
  });
  lines.push('', sep, 'Total events: ' + evs.length + ' | Duration: ' + dur);
  return lines.join('\n');
}

function buildMarkdown() {
  const evs = sortedEvents();
  const dur = getDuration() || '—';
  const t = getType(state.type);
  const typeLabel = t ? t.label : state.type;
  const lines = [
    '## ' + escapeMd(state.title || '(untitled)'), '',
    '**Type:** ' + typeLabel + ' | **Status:** ' + STATUS_LABELS[state.status] + ' | **Duration:** ' + dur, '',
    '**Tags:** ' + (state.tags.length ? state.tags.map(x => '`'+x+'`').join(', ') : '—'), '',
    '### Timeline', '',
    '| Time | Category | Event | Author |',
    '|------|----------|-------|--------|',
  ];
  evs.forEach(ev => {
    const c = getCat(ev.category);
    lines.push('| ' + ev.time + ' | ' + escapeMd(c ? c.label : ev.category) + ' | ' + escapeMd(ev.desc) + ' | ' + escapeMd(ev.author||'') + ' |');
  });
  lines.push('', '---', '', '**Total events:** ' + evs.length + ' | **Duration:** ' + dur);
  return lines.join('\n');
}

function copyWithFeedback(btn, text) {
  const orig = btn.textContent;
  const done = () => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  };
  navigator.clipboard ? navigator.clipboard.writeText(text).then(done).catch(done) : (() => {
    const ta = Object.assign(document.createElement('textarea'), { value: text });
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    ta.remove(); done();
  })();
}

$('copy-text-btn').addEventListener('click', function() { copyWithFeedback(this, buildPlainText()); });
$('copy-md-btn').addEventListener('click',   function() { copyWithFeedback(this, buildMarkdown()); });

// ── New log ───────────────────────────────────────────────────────────────────
newLogBtn.addEventListener('click', () => {
  if (!confirm('Start a new log? This will clear all current data.')) return;
  state = { title: '', type: settings.types[0]?.id || 'other', status: 'active', tags: [], events: [], firstEventTime: null };
  editingId = null;
  localStorage.removeItem('logline_state');
  lastSaved.textContent = 'Not saved yet';
  renderHeader();
  renderTimeline();
  newTime.value = nowHHMM();
});

// ── Easter egg ────────────────────────────────────────────────────────────────
let logClickTimes = [];

logoLog.addEventListener('click', () => {
  const now = Date.now();
  logClickTimes = logClickTimes.filter(t => now - t < 30000);
  logClickTimes.push(now);
  if (logClickTimes.length >= 12) {
    triggerEasterEgg();
    logClickTimes = [];
  }
});

function triggerEasterEgg() {
  brand.classList.remove('bouncing');
  void brand.offsetWidth;
  brand.classList.add('bouncing');
  brand.addEventListener('animationend', () => brand.classList.remove('bouncing'), { once: true });

  const logs = ['🪵','🪵','🪵','🪵','🪵'];
  const offsets = [18, 42, 8, 30, 55]; // top %
  const durations = [2.0, 2.4, 1.8, 2.2, 2.6];

  logs.forEach((emoji, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'rolling-log';
      el.textContent = emoji;
      el.style.top = offsets[i] + 'vh';
      el.style.animationDuration = durations[i] + 's';
      el.style.fontSize = (40 + i * 8) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 180);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  loadAll();
  rebuildTypeSelect();
  rebuildCatSelect();
  renderHeader();
  renderTimeline();

  newTime.value = nowHHMM();
  const la = localStorage.getItem('logline_last_author');
  if (la) newAuthor.value = la;
  newDesc.focus();

  setInterval(() => {
    if (document.activeElement !== newTime) newTime.value = nowHHMM();
  }, 60000);
}

init();
})();
</script>
